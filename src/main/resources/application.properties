spring.application.name=hireflow
spring.config.import=env.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${HIREFLOW_KAFKA_GROUP_ID}

#Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

#Consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer


spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hireflow.hireflow.event.events


#Topics
hireflow.kafka.topics.notification-email=${NOTIFICATION_EMAIL_TOPIC}
hireflow.kafka.topics.application-submitted=${APPLICATION_SUBMITTED_TOPIC}
hireflow.kafka.topics.resume-analysis-completed=${RESUME_ANALYSIS_COMPLETED_TOPIC}
hireflow.kafka.topics.project-consistency-completed=${PROJECT_CONSISTENCY_COMPLETED_TOPIC}
hireflow.kafka.topics.inconsistency-review-completed=${INCONSISTENCY_REVIEW_COMPLETED_TOPIC}
hireflow.kafka.topics.screening-completed=${SCREENING_COMPLETED_TOPIC}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
